<html>
<head>
<h1>javascript functions</h1>
</head>
<body>



<p>A function that multiplies two numbers.</p>



<p id="demo1"></p>
<p id="demo2"></p>
<p id="demo3"></p>

<script>

function multiply(a, b)
{
  return a*b;
}

function divison(x,y)
{
return x/y;
}
let result1 = multiply(4,3);
let result2 = multiply(5,5);
let result3 = divison(10,2);
document.getElementById("demo1").innerHTML= "The result is "+ result1;
document.getElementById("demo2").innerHTML= "The result is "+ result2;
document.getElementById("demo3").innerHTML= "The result is "+ result3;
</script>
</body>
</html>
