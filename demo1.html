<html>
<body>
<h1>javascript variables</h1>


<p>in this example, x,y, and z are variables.</p>


<p id="demo1"></p>
<p id="demo2"></p>
<p id="demo3"></p>
<p id="demo4"></p>



<script>
let x = 5;
let y = 6;

document.getElementById("demo1").innerHTML = "The value of z is " +z	;
document.getElementById("demo2").innerHTML = "The value of a is " +a;
document.getElementById("demo3").innerHTML = "The value of z is " +b	;
document.getElementById("demo4").innerHTML = "The value of a is " +c;


</script>


</body>
